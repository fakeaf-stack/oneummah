<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catalog | ONEUMMAH</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --black: #000;
    --white: #fff;
    --off-white: #f5f5f5;
    --light-gray: #e8e8e8;
    --mid-gray: #999;
    --accent: #c8a96e;
    --font-display: 'Bebas Neue', sans-serif;
    --font-body: 'Montserrat', sans-serif;
  }
  body { font-family: var(--font-body); color: var(--black); background: var(--white); }
  a { color: inherit; text-decoration: none; }

  .announcement-bar {
    background: var(--black);
    color: var(--white);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-align: center;
    padding: 10px 0;
  }
  header {
    position: sticky;
    top: 0;
    z-index: 50;
    background: var(--white);
    border-bottom: 1px solid var(--light-gray);
  }
  .header-inner {
    max-width: 1400px;
    margin: 0 auto;
    height: 64px;
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .nav-left, .nav-right { display: flex; align-items: center; gap: 24px; }
  .nav-left a, .nav-right a {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.13em;
    text-transform: uppercase;
  }
  .logo {
    font-family: var(--font-display);
    font-size: 28px;
    letter-spacing: 0.08em;
  }

  .page-hero {
    background: var(--black);
    color: var(--white);
    text-align: center;
    padding: 90px 20px 60px;
  }
  .page-hero h1 {
    font-family: var(--font-display);
    font-size: clamp(48px, 8vw, 100px);
    letter-spacing: 0.06em;
  }
  .page-hero p {
    margin-top: 12px;
    font-size: 12px;
    color: rgba(255,255,255,0.55);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .catalog-filters {
    max-width: 1400px;
    margin: 0 auto;
    padding: 28px 24px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .filter-btn {
    border: 1px solid var(--light-gray);
    background: var(--white);
    padding: 10px 18px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .filter-btn.active { background: var(--black); color: var(--white); border-color: var(--black); }

  .catalog-grid {
    max-width: 1000px;
    margin: 0 auto;
    padding: 0 24px 70px;
    display: grid;
    grid-template-columns: repeat(2, minmax(260px, 360px));
    gap: 24px;
    justify-content: center;
  }
  .card { border: 1px solid var(--light-gray); background: var(--white); }
  .thumb {
    aspect-ratio: 3/4;
    background: linear-gradient(160deg, #1a1a1a 0%, #2a2a2a 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 18px;
    background-position: center center;
    background-repeat: no-repeat;
    background-size: contain;
  }
  .thumb-text {
    color: rgba(255,255,255,0.12);
    font-family: var(--font-display);
    font-size: clamp(24px, 3vw, 40px);
    letter-spacing: 0.06em;
  }
  .meta { padding: 14px 16px 18px; }
  .name {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .price { display: flex; gap: 8px; align-items: center; }
  .old { color: var(--mid-gray); text-decoration: line-through; font-size: 11px; }
  .new { font-weight: 700; font-size: 13px; }
  .product-meta {
    margin-top: 8px;
    font-size: 11px;
    line-height: 1.6;
    color: var(--mid-gray);
    letter-spacing: 0.03em;
    text-transform: none;
  }
  .empty-state {
    grid-column: 1 / -1;
    padding: 48px 24px;
    text-align: center;
    font-size: 13px;
    letter-spacing: 0.04em;
    color: var(--mid-gray);
    border: 1px dashed var(--light-gray);
    background: var(--off-white);
  }

  @media (max-width: 900px) {
    .catalog-grid { grid-template-columns: repeat(2, 1fr); }
    .logo { font-size: 22px; }
    .nav-right { display: none; }
  }
  @media (max-width: 600px) {
    .header-inner { padding: 0 14px; }
    .nav-left { gap: 12px; }
    .nav-left a { font-size: 10px; letter-spacing: 0.08em; }
    .catalog-grid { padding: 0 14px 56px; gap: 10px; }
    .catalog-filters { padding: 20px 14px; }
  }
</style>
<link rel="stylesheet" href="shared-shell.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="shared-shell.js"></script>
</head>
<body>

<div id="sharedHeader"></div>

<section class="page-hero">
  <h1>Catalog</h1>
  <p>All products, premium Islamic streetwear</p>
</section>

<section class="catalog-filters">
  <button class="filter-btn active" type="button">All</button>
  <button class="filter-btn" type="button">Oversized+</button>
</section>

<section class="catalog-grid">
  <article class="card">
    <div class="thumb"><span class="thumb-text">PRODUCT ALPHA</span></div>
    <div class="meta"><p class="name">Alpha Tee | Placeholder</p><p class="price"><span class="old">EUR 0.00</span><span class="new">EUR 9.99</span></p></div>
  </article>
  <article class="card">
    <div class="thumb"><span class="thumb-text">PRODUCT BETA</span></div>
    <div class="meta"><p class="name">Beta Tee | Placeholder</p><p class="price"><span class="old">EUR 0.00</span><span class="new">EUR 14.99</span></p></div>
  </article>
</section>

<div id="sharedFooter"></div>
</body>
</html>
