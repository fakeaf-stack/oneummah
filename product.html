<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product | ONEUMMAH</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  :root {
    --black: #000;
    --white: #fff;
    --off-white: #f5f5f5;
    --light-gray: #e8e8e8;
    --mid-gray: #888;
    --accent: #c8a96e;
    --font-display: 'Bebas Neue', sans-serif;
    --font-body: 'Montserrat', sans-serif;
  }
  body {
    margin: 0;
    font-family: var(--font-body);
    background: linear-gradient(180deg, #fff, #f8f8f8 55%, #f0f0f0);
    color: var(--black);
  }
  a { color: inherit; text-decoration: none; }
  .page-shell {
    max-width: 1280px;
    margin: 0 auto;
    padding: 28px 20px 60px;
  }
  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    margin-bottom: 28px;
  }
  .topbar a {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }
  .brand {
    font-family: var(--font-display);
    font-size: 28px;
    letter-spacing: 0.08em;
  }
  .detail-layout {
    display: grid;
    grid-template-columns: minmax(0, 1.05fr) minmax(320px, 0.95fr);
    gap: 28px;
    align-items: start;
  }
  .detail-media,
  .detail-copy {
    background: rgba(255,255,255,0.8);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(0,0,0,0.08);
    border-radius: 26px;
    overflow: hidden;
    box-shadow: 0 24px 60px rgba(0,0,0,0.08);
  }
  .detail-main-image {
    width: 100%;
    aspect-ratio: 4 / 5;
    background: linear-gradient(160deg, #161616, #2d2d2d);
    background-size: cover;
    background-position: center;
  }
  .detail-gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(60px, 1fr));
    gap: 10px;
    padding: 14px;
    border-top: 1px solid rgba(0,0,0,0.06);
    background: rgba(255,255,255,0.85);
  }
  .detail-thumb {
    aspect-ratio: 1 / 1;
    border-radius: 12px;
    border: 1px solid rgba(0,0,0,0.08);
    background: linear-gradient(160deg, #1c1c1c, #3b3b3b);
    background-size: cover;
    background-position: center;
    cursor: pointer;
    opacity: 0.72;
    transition: transform 0.2s, opacity 0.2s, border-color 0.2s;
  }
  .detail-thumb.is-active,
  .detail-thumb:hover {
    opacity: 1;
    transform: translateY(-1px);
    border-color: rgba(0,0,0,0.18);
  }
  .detail-copy {
    padding: 28px;
  }
  .detail-category {
    margin: 0 0 8px;
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--mid-gray);
  }
  .detail-title {
    margin: 0;
    font-family: var(--font-display);
    font-size: clamp(42px, 6vw, 74px);
    line-height: 0.94;
    letter-spacing: 0.05em;
  }
  .detail-price {
    margin: 18px 0 0;
    font-size: 28px;
    font-weight: 800;
    letter-spacing: 0.02em;
  }
  .detail-description {
    margin: 18px 0 0;
    font-size: 14px;
    line-height: 1.9;
    color: #444;
  }
  .detail-sizes {
    margin: 18px 0 0;
    font-size: 13px;
    line-height: 1.7;
    color: #444;
  }
  .detail-actions {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-top: 26px;
  }
  .detail-button {
    border: none;
    border-radius: 14px;
    padding: 14px 18px;
    background: var(--black);
    color: var(--white);
    font: inherit;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer;
  }
  .detail-button-secondary {
    background: rgba(0,0,0,0.06);
    color: var(--black);
  }
  .detail-empty {
    margin: 0;
    padding: 120px 24px;
    text-align: center;
    font-size: 14px;
    color: var(--mid-gray);
  }
  @media (max-width: 960px) {
    .detail-layout { grid-template-columns: 1fr; }
    .brand { font-size: 22px; }
  }
  @media (max-width: 600px) {
    .page-shell { padding: 20px 14px 40px; }
    .topbar { align-items: flex-start; }
    .detail-copy { padding: 20px; }
  }
</style>
<link rel="stylesheet" href="shared-shell.css">
</head>
<body>
  <div id="sharedHeader"></div>
  <div class="page-shell">

    <main id="productDetail" class="detail-layout">
      <p class="detail-empty">Loading product details...</p>
    </main>
  </div>

  <div id="sharedFooter"></div>

  <script src="shared-shell.js"></script>
</body>
</html>
