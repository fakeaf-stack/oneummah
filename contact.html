<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | ONEUMMAH</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --black: #000;
    --white: #fff;
    --off-white: #f5f5f5;
    --light-gray: #e8e8e8;
    --mid-gray: #999;
    --accent: #c8a96e;
    --font-display: 'Bebas Neue', sans-serif;
    --font-body: 'Montserrat', sans-serif;
  }
  body { font-family: var(--font-body); color: var(--black); background: var(--white); }
  a { color: inherit; text-decoration: none; }

  header {
    position: sticky;
    top: 0;
    z-index: 50;
    background: var(--white);
    border-bottom: 1px solid var(--light-gray);
  }
  .header-inner {
    max-width: 1400px;
    margin: 0 auto;
    height: 64px;
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .nav-left { display: flex; align-items: center; gap: 24px; }
  .nav-left a {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.13em;
    text-transform: uppercase;
  }
  .logo {
    font-family: var(--font-display);
    font-size: 28px;
    letter-spacing: 0.08em;
  }

  .page-hero {
    background: var(--black);
    color: var(--white);
    text-align: center;
    padding: 90px 20px 56px;
  }
  .page-hero h1 {
    font-family: var(--font-display);
    font-size: clamp(48px, 8vw, 100px);
    letter-spacing: 0.06em;
  }
  .page-hero p {
    margin-top: 12px;
    font-size: 12px;
    color: rgba(255,255,255,0.55);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .contact-wrap {
    max-width: 700px;
    margin: 0 auto;
    padding: 50px 24px 90px;
  }
  .intro {
    text-align: center;
    color: #444;
    font-size: 13px;
    line-height: 1.8;
    letter-spacing: 0.03em;
    margin-bottom: 36px;
  }
  .field { margin-bottom: 18px; }
  label {
    display: block;
    margin-bottom: 8px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }
  input, select, textarea {
    width: 100%;
    border: 1.5px solid var(--light-gray);
    font-family: var(--font-body);
    font-size: 13px;
    padding: 13px 14px;
    outline: none;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--black); }
  textarea { min-height: 130px; resize: vertical; }
  .submit {
    width: 100%;
    border: none;
    background: var(--black);
    color: var(--white);
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 16px;
    cursor: pointer;
  }
  .submit:hover { background: var(--accent); }
  .success {
    display: none;
    margin-top: 18px;
    text-align: center;
    background: var(--off-white);
    padding: 18px;
    font-size: 13px;
  }
  .success.show { display: block; }

  @media (max-width: 900px) {
    .logo { font-size: 22px; }
  }
  @media (max-width: 600px) {
    .header-inner { padding: 0 14px; }
    .nav-left { gap: 12px; }
    .nav-left a { font-size: 10px; letter-spacing: 0.08em; }
  }
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
</head>
<body>
<header>
  <div class="header-inner">
    <nav class="nav-left">
      <a href="ummahrise-clone.html">Home</a>
      <a href="catalog.html">Catalog</a>
      <a href="contact.html">Contact</a>
      <a href="track.html">Track Your Order</a>
    </nav>
    <a class="logo" href="ummahrise-clone.html">ONEUMMAH</a>
  </div>
</header>

<section class="page-hero">
  <h1>Contact</h1>
  <p>We are here to help</p>
</section>

<section class="contact-wrap">
  <p class="intro">Have a question about your order, sizing, or shipping? Send a message and our team will reply as soon as possible.</p>
  <form id="contactForm">
    <div class="field">
      <label for="name">Your Name</label>
      <input id="name" type="text" placeholder="Enter your full name" required>
    </div>
    <div class="field">
      <label for="email">Email Address</label>
      <input id="email" type="email" placeholder="Enter your email" required>
    </div>
    <div class="field">
      <label for="subject">Subject</label>
      <select id="subject">
        <option>Order inquiry</option>
        <option>Return and refund</option>
        <option>Sizing help</option>
        <option>Other</option>
      </select>
    </div>
    <div class="field">
      <label for="message">Message</label>
      <textarea id="message" placeholder="Write your message here" required></textarea>
    </div>
    <button class="submit" type="submit">Send Message</button>
  </form>
  <div id="success" class="success">Thanks. Your message has been sent.</div>
</section>

<script>
  document.getElementById('contactForm').addEventListener('submit', function (event) {
    event.preventDefault();
    document.getElementById('success').classList.add('show');
    event.target.reset();
  });
</script>
</body>
</html>
